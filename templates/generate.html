{% extends "base.html" %}
{% block content %}

<h1>🤖 Generate Healthcare Plan</h1>

<form method="post" class="form-box" onsubmit="document.getElementById('loader').style.display='block'">
    <input name="age" placeholder="Age" required>
    <input name="gender" placeholder="Gender" required>
    <textarea name="symptoms" placeholder="Enter symptoms..." required></textarea>
    <button type="submit">Generate</button>
    <div id="loader" style="display:none; margin-top:15px; color:#00bcd4; font-weight:bold;">⏳ Generating Report...</div>
</form>

{% if report %}
<div class="result">
    <h2>🧾 Medical Report</h2>
    <div class="formatted">
    {{ report | safe }}
</div>
</div>
{% endif %}

{% if plan %}
<div class="result">
    <h2>📋 Treatment Plan</h2>
    <div class="formatted">
    {{ plan | safe }}
</div>
</div>
{% endif %}

{% endblock %}
